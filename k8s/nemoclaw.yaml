# NemoClaw — NVIDIA agent framework routed to remote Ollama on DGX Spark.
# Verify the image tag at: https://catalog.ngc.nvidia.com/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemoclaw
  namespace: luminaige
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemoclaw
  template:
    metadata:
      labels:
        app: nemoclaw
    spec:
      imagePullSecrets:
        - name: ngc-registry
      containers:
        - name: nemoclaw
          image: nvcr.io/nvidia/nemoclaw:latest   # confirm tag on NGC
          ports:
            - containerPort: 8080
          env:
            - name: DGX_SPARK_IP
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: DGX_SPARK_IP
            - name: OLLAMA_BASE_URL
              value: "http://$(DGX_SPARK_IP):11434"
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: luminaige-secrets
                  key: NGC_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: nemoclaw
  namespace: luminaige
spec:
  type: ClusterIP
  selector:
    app: nemoclaw
  ports:
    - port: 8080
      targetPort: 8080
