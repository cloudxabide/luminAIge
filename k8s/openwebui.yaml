apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: luminaige
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: harvester
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: luminaige
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: DGX_SPARK_IP
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: DGX_SPARK_IP
            - name: OLLAMA_BASE_URL
              value: "http://$(DGX_SPARK_IP):11434"
            - name: ENABLE_RAG_WEB_SEARCH
              value: "true"
            - name: RAG_WEB_SEARCH_ENGINE
              value: "searxng"
            - name: SEARXNG_QUERY_URL
              value: "http://searxng:8080/search?q=<query>&format=json"
            - name: QDRANT_URI
              value: "http://qdrant:6333"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: luminaige
spec:
  type: LoadBalancer
  selector:
    app: openwebui
  ports:
    - port: 3000
      targetPort: 8080
