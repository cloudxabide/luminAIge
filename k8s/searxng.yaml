apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: luminaige
data:
  settings.yml: |
    use_default_settings: true

    server:
      secret_key: "${SEARXNG_SECRET_KEY}"
      limiter: false
      image_proxy: true

    ui:
      static_use_hash: true

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"

    outgoing:
      request_timeout: 10.0

    formats:
      - html
      - json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: luminaige
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "http://searxng:8080/"
            - name: SEARXNG_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: luminaige-secrets
                  key: SEARXNG_SECRET_KEY
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng
      volumes:
        - name: settings
          configMap:
            name: searxng-settings
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: luminaige
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
