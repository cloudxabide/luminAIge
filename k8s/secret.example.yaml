# Copy to secret.yaml, fill in real values, and apply before deploying.
# To base64-encode a value: echo -n 'your-value' | base64
# To generate a SearXNG key:  openssl rand -hex 32 | tr -d '\n' | base64
#
# secret.yaml is git-ignored — never commit it.
apiVersion: v1
kind: Secret
metadata:
  name: luminaige-secrets
  namespace: luminaige
type: Opaque
data:
  SEARXNG_SECRET_KEY: Y2hhbmdlbWU=   # replace: openssl rand -hex 32 | tr -d '\n' | base64
  NGC_API_KEY: Y2hhbmdlbWU=          # NGC API key for NemoClaw image pull
